<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <meta name="description" content="Saffron & Sage — a high-performance digital menu. Browse our chef-crafted starters, mains, desserts and drinks, filter by category, and explore each dish in rich detail." />

    <title>Saffron &amp; Sage — Digital Menu</title>

    <!-- Open Graph -->
    <meta property="og:type" content="restaurant.menu" />
    <meta property="og:title" content="Saffron &amp; Sage — Digital Menu" />
    <meta property="og:description" content="Chef-crafted plates, wood-fired classics and signature drinks. Explore the full menu on your phone." />
    <meta property="og:image" content="images/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://saffronandsage.example/menu" />
    <meta property="og:site_name" content="Saffron &amp; Sage" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Saffron &amp; Sage — Digital Menu" />
    <meta name="twitter:description" content="Chef-crafted plates, wood-fired classics and signature drinks. Explore the full menu on your phone." />
    <meta name="twitter:image" content="images/og-cover.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-shell">
      <!-- ============ HEADER / BRANDING ============ -->
      <header class="header" role="banner">
        <div class="header__top">
          <div class="brand">
            <span class="brand__mark" aria-hidden="true">S</span>
            <div class="brand__text">
              <h1 class="brand__name">Saffron &amp; Sage</h1>
              <p class="brand__tag">Modern kitchen &middot; Open daily</p>
            </div>
          </div>

          <button
            id="themeToggle"
            class="icon-btn theme-toggle"
            type="button"
            aria-pressed="false"
            aria-label="Toggle dark mode"
          >
            <svg class="icon icon--sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"></path>
            </svg>
            <svg class="icon icon--moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
            </svg>
          </button>
        </div>

        <!-- Quick contact micro-interactions -->
        <div class="quick-contact" role="list" aria-label="Quick contact">
          <a class="quick-contact__btn" role="listitem" href="tel:+15551234567">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8 9.8a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"></path>
            </svg>
            <span>Call</span>
          </a>
          <a class="quick-contact__btn" role="listitem" href="https://maps.google.com/?q=Saffron+and+Sage" target="_blank" rel="noopener">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>Location</span>
          </a>
          <a class="quick-contact__btn" role="listitem" href="#hours">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 7v5l3 2"></path>
            </svg>
            <span>Hours</span>
          </a>
        </div>
      </header>

      <!-- ============ STICKY CATEGORY NAV ============ -->
      <nav class="category-bar" id="categoryBar" aria-label="Menu categories">
        <div class="category-bar__track" id="categoryTrack" role="tablist"></div>
      </nav>

      <!-- ============ MAIN MENU GRID ============ -->
      <main class="menu" id="mainContent">
        <div class="menu__head">
          <h2 class="menu__title" id="activeCategoryTitle">Full Menu</h2>
          <p class="menu__count" id="itemCount"></p>
        </div>
        <section class="menu__grid" id="menuGrid" aria-live="polite"></section>
        <p class="menu__empty" id="emptyState" hidden>No dishes in this category yet.</p>
      </main>

      <!-- ============ FEEDBACK / LEAD FORM ============ -->
      <section class="feedback" id="hours">
        <div class="feedback__inner">
          <div class="feedback__intro">
            <h2 class="feedback__title">Stay in the loop</h2>
            <p class="feedback__copy">
              Open daily 11:00&ndash;23:00. Drop your details for seasonal specials and private-dining offers.
            </p>
          </div>
          <form class="feedback__form" id="leadForm" novalidate>
            <div class="field">
              <label class="field__label" for="leadName">Name</label>
              <input class="field__input" id="leadName" name="name" type="text" autocomplete="name" placeholder="Your name" required />
            </div>
            <div class="field">
              <label class="field__label" for="leadEmail">Email</label>
              <input class="field__input" id="leadEmail" name="email" type="email" autocomplete="email" placeholder="you@email.com" required />
            </div>
            <div class="field">
              <label class="field__label" for="leadMsg">Message</label>
              <textarea class="field__input field__input--area" id="leadMsg" name="message" rows="3" placeholder="Tell us what you loved..."></textarea>
            </div>
            <button class="btn btn--primary btn--block" type="submit">Send feedback</button>
            <p class="feedback__status" id="formStatus" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>

      <footer class="footer">
        <p>&copy; <span id="year"></span> Saffron &amp; Sage. Crafted with care.</p>
      </footer>
    </div>

    <!-- ============ ITEM DETAIL MODAL ============ -->
    <dialog class="modal" id="itemModal" aria-labelledby="modalName">
      <div class="modal__card">
        <button class="icon-btn modal__close" id="modalClose" type="button" aria-label="Close details">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12"></path>
          </svg>
        </button>
        <figure class="modal__media">
          <img id="modalImage" class="modal__img" src="" alt="" />
        </figure>
        <div class="modal__body">
          <div class="modal__badges" id="modalBadges"></div>
          <h3 class="modal__name" id="modalName"></h3>
          <p class="modal__price" id="modalPrice"></p>
          <p class="modal__desc" id="modalDesc"></p>

          <div class="modal__recos">
            <h4 class="modal__recos-title">You might also like</h4>
            <ul class="modal__recos-list" id="modalRecos"></ul>
          </div>

          <div class="modal__actions">
            <button class="btn btn--primary" id="modalShare" type="button">Share this dish</button>
            <a class="btn btn--ghost" href="tel:+15551234567">Order by phone</a>
          </div>
        </div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <script src="app.js" defer></script>
  </body>
</html>
